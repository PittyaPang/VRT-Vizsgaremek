<script>
    // Funkció a táblázatok váltásához
    function showTable(tableId) {
        // Elrejtjük az összes táblázatot
        document.querySelectorAll('.content > div').forEach(function(div) {
            div.classList.add('hidden');
        })
        document.querySelectorAll('.content2 > div').forEach(function(div) {
            div.classList.add('hidden');
        });
        
        // Megjelenítjük a kiválasztott táblázatot
        document.getElementById(tableId).classList.remove('hidden');
    }

    // Alapértelmezett táblázat megjelenítése (pl. Tabella)
    window.onload = function() {
        showTable('table');
    };
    const myModal = document.getElementById('myModal')
const myInput = document.getElementById('myInput')

myModal.addEventListener('shown.bs.modal', () => {
